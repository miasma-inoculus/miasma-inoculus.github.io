  <body>
    <!-- Main Application Container -->
    <div id="root"></div>
    
    <script>
      // Rename Fallback: Ensures "The Inkwell" becomes "Miasma Inoculus" in dynamic content
      window.addEventListener('DOMContentLoaded', () => {
        const renameText = () => {
          document.querySelectorAll('*').forEach(el => {
            if (el.children.length === 0 && el.textContent.includes('The Inkwell')) {
              el.textContent = el.textContent.replace(/The Inkwell/g, 'Miasma Inoculus');
            }
          });
        };
        const observer = new MutationObserver(renameText);
        observer.observe(document.body, { childList: true, subtree: true });
        renameText();
      });
    </script>
