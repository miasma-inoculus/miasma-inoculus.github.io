<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miasma Inoculus — Victorian Gothic Archive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            /* Using a high-quality external dark stone/parchment texture */
            background: #050505 url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: #f5f5f5;
            font-family: 'Lora', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 3rem auto;
        }

        /* This creates that 'Issue' frame from your screenshot */
        .gold-frame {
            border: 2px solid #d09945;
            padding: 30px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 10px rgba(208, 153, 69, 0.2);
            margin-bottom: 40px;
            position: relative;
        }

        h1.font-ornate {
            font-family: 'Cinzel', serif;
            color: #f9e1b6;
            text-align: center;
            letter-spacing: 5px;
            font-size: clamp(24px, 6vw, 36px);
            margin-bottom: 5px;
        }

        .sub-head {
            text-align: center;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .story-title {
            font-family: 'Playfair Display', serif;
            color: #f9e1b6;
            font-size: 28px;
            margin: 15px 0;
            font-style: italic;
        }

        .horror-tag {
            background: #961428;
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .story-content {
            font-size: 19px;
            line-height: 1.8;
            color: #e0e0e0;
        }

        .read-link {
            color: #d09945;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 25px;
            border-bottom: 1px solid transparent;
        }

        .read-link:hover {
            border-bottom: 1px solid #d09945;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="gold-frame">
            <h1 class="font-ornate">MIASMA INOCULUS</h1>
            <p class="sub-head">Vol. 1 • Est. 1887 • A New Tale Each Midnight</p>
        </header>

        <main>
            <article class="gold-frame">
                <div style="margin-bottom: 15px;">
                    <span class="horror-tag">HORROR</span>
                    <span style="color: #888; margin-left: 10px; font-size: 13px;">APRIL 29, 1887</span>
                </div>
                
                <h2 class="story-title">The Thirteenth Knock</h2>
                <p class="story-content">
                    "She counted twelve knocks before she opened the door. There was no one there. Then the thirteenth came from inside."
                </p>
                
                <a href="#" class="read-link">ENTER THE ARCHIVE →</a>
            </article>
        </main>

        <footer style="text-align: center; color: #444; font-size: 11px; padding-bottom: 40px;">
            © 1887 MIASMA INOCULUS ARCHIVE
        </footer>
    </div>
</body>
</html>
