  <body>
    <div id="root"></div>
    <script>
      // Fallback to ensure the header text is updated if rendered by JS
      window.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver((mutations) => {
          document.querySelectorAll('*').forEach(el => {
            if (el.children.length === 0 && el.textContent.includes('The Inkwell')) {
              el.textContent = el.textContent.replace(/The Inkwell/g, 'Miasma Inoculus');
            }
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
